rules = [
  Disable
  DisableSyntax
  ExplicitResultTypes
  LeakingImplicitClassVal
  NoAutoTupling
  NoValInForComprehension
  OrganizeImports
  ProcedureSyntax
  RemoveUnused
]

// Exclude Scala 3-only sources from scalafix to avoid cross-build issues
// Shared and Scala 2 sources still benefit from linting/fixes
project.excludePaths = [
  "glob:**/zio-sbt-source/src/main/scala-3/**"
]

Disable {
  ifSynthetic = [
    "scala/Option.option2Iterable"
    "scala/Predef.any2stringadd"
  ]
}

OrganizeImports {
  expandRelative = true
  groupedImports = Merge
  groups = [
    "re:javax?\\.",
    "scala.",
    "*",
    "zio."
  ]
}

RemoveUnused {
  imports = false // handled by OrganizeImports
}
